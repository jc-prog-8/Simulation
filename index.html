<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Space Pirates</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="game-root">
      <canvas id="game-canvas" aria-label="Space Pirates simulation"></canvas>

      <div id="hud-top-right" class="panel">
        <span class="label">Gold</span>
        <span id="gold-value">0</span>
      </div>

      <div id="ticker" class="panel"></div>

      <button id="menu-button" class="ring-button" aria-label="Open menu">◉</button>

      <div id="overlay-menu" class="overlay hidden" role="dialog" aria-modal="true">
        <div class="overlay-inner">
          <div class="menu-tabs">
            <button class="tab-btn active" data-tab="build">Build</button>
            <button class="tab-btn" data-tab="stats">Statistics</button>
          </div>

          <section id="build-tab" class="tab-panel">
            <h2>Build</h2>
            <div id="build-options" class="cards"></div>
          </section>

          <section id="stats-tab" class="tab-panel hidden">
            <h2>Statistics</h2>
            <ul id="stats-list"></ul>
            <canvas id="stats-graph" width="720" height="240" aria-label="Statistics graph over time"></canvas>
          </section>

          <div class="menu-footer">
            <button id="reset-game" class="danger-btn" type="button" aria-label="Start a new game and clear current save">New Game</button>
            <button id="close-menu" class="close-btn" type="button">Resume</button>
          </div>
        </div>
      </div>

      <div id="overlay-upgrade" class="overlay hidden" role="dialog" aria-modal="true">
        <div class="overlay-inner">
          <h2 id="upgrade-title">Building</h2>
          <p id="upgrade-role"></p>
          <p id="upgrade-level"></p>
          <p id="upgrade-benefit"></p>
          <p id="upgrade-cost"></p>
          <div class="upgrade-actions">
            <button id="upgrade-buy">Upgrade</button>
            <button id="upgrade-close">Close</button>
          </div>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
